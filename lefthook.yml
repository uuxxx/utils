#   https://lefthook.dev/configuration/

pre-push:
  parallel: true
  jobs:
    - name: types
      run: pnpm types:check

    - name: lint
      run: pnpm lint:check

    - name: test
      run: pnpm test:run

pre-commit:
  parallel: true
  jobs:
    - name: types
      run: pnpm types:check

    - name: lint
      run: pnpm lint:check

    - name: test
      run: pnpm test:run
